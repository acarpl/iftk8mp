<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT Informatika - Evaluasi</title>

<style>
body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#2193b0,#6dd5ed);
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.exam-box{
    background:white;
    width:95%;
    max-width:900px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
    position:relative;
}
.timer{
    position:absolute;
    top:15px;
    right:20px;
    font-weight:bold;
    color:#e74c3c;
}
.progress{
    text-align:center;
    font-weight:bold;
    margin-bottom:10px;
}
.question{
    margin:15px 0;
    font-weight:600;
}
.options label{
    display:block;
    margin:6px 0;
    padding:8px;
    background:#f1f2f6;
    border-radius:8px;
    cursor:pointer;
}
textarea,input[type=text]{
    width:100%;
    padding:8px;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    padding:8px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    margin:5px 0;
}
.prev{background:#95a5a6;color:white;}
.next{background:#3498db;color:white;}
.submit{background:#2ecc71;color:white;width:100%;}
.result{
    margin-top:20px;
    background:#f9f9f9;
    padding:15px;
    border-radius:10px;
    max-height:400px;
    overflow:auto;
}
h3{margin-top:15px;}
</style>
</head>

<body>

<div class="exam-box">
<div class="timer">⏳ <span id="time">25:00</span></div>
<div class="progress">Soal <span id="current">1</span> dari 20</div>
<div id="questionContainer"></div>

<button class="prev" onclick="prevQuestion()">← Prev</button>
<button class="next" onclick="nextQuestion()">Next →</button>
<button class="submit" onclick="submitQuiz()">Selesai Ujian</button>

<div id="result" class="result"></div>
</div>

<script>

const questions=[

{type:"pg",q:"Data adalah ...",options:["Fakta mentah","Grafik","Kesimpulan","Program"],answer:0},
{type:"pg",q:"Data kualitatif berbentuk ...",options:["Angka","Kategori","Rumus","Nilai"],answer:1},
{type:"pg",q:"Data kuantitatif diskrit contohnya ...",options:["Tinggi badan","Jumlah siswa","Warna","Jenis kelamin"],answer:1},
{type:"pg",q:"Langkah pertama pengolahan data adalah ...",options:["Menganalisis","Menyajikan","Mengumpulkan","Menyimpulkan"],answer:2},
{type:"pg",q:"Diagram batang cocok untuk ...",options:["Perbandingan data","Cerita","Kode","Rumus"],answer:0},
{type:"pg",q:"Rumus rata-rata di Excel adalah ...",options:["=SUM()","=AVERAGE()","=MAX()","=MIN()"],answer:1},
{type:"pg",q:"Fungsi SUM digunakan untuk ...",options:["Rata-rata","Jumlah","Nilai terbesar","Filter"],answer:1},
{type:"pg",q:"Sorting berarti ...",options:["Menghapus","Mengurutkan","Menyaring","Menggambar"],answer:1},
{type:"pg",q:"Filter berfungsi untuk ...",options:["Menyaring data","Menjumlahkan","Menghapus file","Mengurutkan otomatis"],answer:0},
{type:"pg",q:"Workbook adalah ...",options:["Cell","Sheet","Kumpulan worksheet","Baris"],answer:2},

{type:"bs",q:"Data harus akurat agar analisis benar.",answer:true},
{type:"bs",q:"Worksheet adalah kumpulan workbook.",answer:false},

{type:"isian",q:"Rumus untuk menjumlahkan A1 sampai A5 adalah ...",answer:"=sum"},
{type:"isian",q:"Pertemuan baris dan kolom disebut ...",answer:"cell"},

{type:"essay",q:"Jelaskan langkah pengolahan data dari awal sampai akhir!"},
{type:"essay",q:"Jelaskan manfaat menggunakan rumus otomatis di Excel!"},

{type:"pg",q:"Data sebelum grafik harus disusun dalam bentuk ...",options:["Tabel","Cerita","Kode","Gambar"],answer:0},
{type:"pg",q:"MAX berfungsi untuk ...",options:["Nilai terkecil","Jumlah","Nilai terbesar","Rata-rata"],answer:2},
{type:"pg",q:"MIN berfungsi untuk ...",options:["Nilai terkecil","Nilai terbesar","Jumlah","Filter"],answer:0},
{type:"pg",q:"Analisis data bertujuan untuk ...",options:["Menggambar","Menyimpulkan informasi","Menghapus data","Mengurutkan"],answer:1}

];

let currentQuestion=0;
let userAnswers=new Array(questions.length).fill(null);

function loadQuestion(){
document.getElementById("current").textContent=currentQuestion+1;
let q=questions[currentQuestion];
let html=`<div class="question">${q.q}</div>`;

if(q.type==="pg"){
q.options.forEach((opt,i)=>{
html+=`<label><input type="radio" onclick="saveAnswer(${i})"> ${opt}</label>`;
});
}
if(q.type==="bs"){
html+=`<label><input type="radio" onclick="saveAnswer(true)"> Benar</label>`;
html+=`<label><input type="radio" onclick="saveAnswer(false)"> Salah</label>`;
}
if(q.type==="isian"){
html+=`<input type="text" oninput="saveAnswer(this.value)">`;
}
if(q.type==="essay"){
html+=`<textarea oninput="saveAnswer(this.value)"></textarea>`;
}

document.getElementById("questionContainer").innerHTML=html;
}

function saveAnswer(val){ userAnswers[currentQuestion]=val; }
function nextQuestion(){ if(currentQuestion<questions.length-1){currentQuestion++;loadQuestion();}}
function prevQuestion(){ if(currentQuestion>0){currentQuestion--;loadQuestion();}}

function submitQuiz(){
let score=0;
let autoTotal=16;

questions.forEach((q,i)=>{
if(q.type==="pg"||q.type==="bs"){
if(userAnswers[i]==q.answer)score++;
}
if(q.type==="isian"){
if((userAnswers[i]||"").toLowerCase().includes(q.answer))score++;
}
});

let nilai=Math.round((score/autoTotal)*100);

document.getElementById("result").innerHTML=
`<h2>Nilai Otomatis: ${nilai}</h2>
<p>Essay dinilai manual.</p>

<h3>📘 RANGKUMAN MATERI LENGKAP UNTUK EVALUASI</h3>

<b>1. Konsep Data</b><br>
Data adalah fakta mentah yang belum diolah. Data bisa berupa angka, teks, simbol, atau gambar.

<b>2. Jenis Data</b><br>
- Kualitatif → berbentuk kategori (warna, jenis kelamin)<br>
- Kuantitatif → berbentuk angka<br>
   • Diskrit → jumlah siswa<br>
   • Kontinu → tinggi badan

<b>3. Langkah Pengolahan Data</b><br>
1. Mengumpulkan data<br>
2. Mengolah data<br>
3. Menyajikan data (tabel/grafik)<br>
4. Menganalisis data<br>
5. Menyimpulkan

<b>4. Penyajian Data</b><br>
- Tabel<br>
- Diagram batang (perbandingan)<br>
- Diagram lingkaran (persentase)

<b>5. Microsoft Excel</b><br>
- Workbook → file Excel<br>
- Worksheet → lembar kerja<br>
- Cell → pertemuan baris dan kolom

<b>6. Rumus Penting Excel</b><br>
=SUM() → menjumlahkan<br>
=AVERAGE() → rata-rata<br>
=MAX() → nilai terbesar<br>
=MIN() → nilai terkecil

<b>7. Fitur Penting</b><br>
- Sorting → mengurutkan data<br>
- Filter → menyaring data

<b>8. Manfaat Rumus Otomatis</b><br>
- Menghemat waktu<br>
- Mengurangi kesalahan<br>
- Cepat menghitung data banyak<br>
- Hasil lebih akurat
`;
}

loadQuestion();

/* TIMER */
let totalTime=1500;
let timeLeft=totalTime;
let timerDisplay=document.getElementById("time");

let timer=setInterval(function(){
let m=Math.floor(timeLeft/60);
let s=timeLeft%60;
timerDisplay.textContent=(m<10?"0":"")+m+":"+(s<10?"0":"")+s;
timeLeft--;
if(timeLeft<0){
clearInterval(timer);
submitQuiz();
}
},1000);

</script>
</body>
</html>
