<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT Informatika - Pengolahan Data</title>

<style>
body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.exam-box{
    background:white;
    width:95%;
    max-width:850px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
    position:relative;
}

.timer{
    position:absolute;
    top:15px;
    right:20px;
    font-weight:bold;
    color:#e74c3c;
}

.progress{
    text-align:center;
    font-weight:bold;
    margin-bottom:10px;
}

.question{
    margin:15px 0;
    font-weight:600;
}

.options label{
    display:block;
    margin:6px 0;
    padding:8px;
    background:#f1f2f6;
    border-radius:8px;
    cursor:pointer;
}

textarea,input[type=text]{
    width:100%;
    padding:8px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    padding:8px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    margin:5px 0;
}

.prev{background:#95a5a6;color:white;}
.next{background:#3498db;color:white;}
.submit{background:#2ecc71;color:white;width:100%;}

.result{
    margin-top:20px;
    background:#f9f9f9;
    padding:15px;
    border-radius:10px;
    max-height:350px;
    overflow:auto;
}

.correct{color:green;}
.wrong{color:red;}
</style>
</head>

<body>

<div class="exam-box">
<div class="timer">⏳ <span id="time">25:00</span></div>
<div class="progress">Soal <span id="current">1</span> dari 31</div>

<div id="questionContainer"></div>

<button class="prev" onclick="prevQuestion()">← Prev</button>
<button class="next" onclick="nextQuestion()">Next →</button>
<button class="submit" onclick="submitQuiz()">Selesai Ujian</button>

<div id="result" class="result"></div>
</div>

<script>

const questions = [

/* 1–15 PG */

{type:"pg",q:"Data adalah ...",
options:["Kumpulan fakta mentah","Kesimpulan akhir","Grafik","Program komputer"],answer:0},

{type:"pg",q:"Rata-rata dari 70,80,90 adalah...",
options:["75","80","85","90"],answer:1},

{type:"pg",q:"Data kualitatif adalah data berbentuk...",
options:["Angka","Kategori","Rumus","Nilai rata-rata"],answer:1},

{type:"pg",q:"Contoh data kuantitatif diskrit adalah...",
options:["Tinggi badan","Jumlah siswa","Warna","Jenis kelamin"],answer:1},

{type:"pg",q:"Dari tabel nilai, siswa lulus jika ≥75. Jika nilai 80 maka...",
options:["Tidak lulus","Lulus","Remedial","Tidak diketahui"],answer:1},

{type:"pg",q:"Metode pengumpulan data dengan bertanya langsung disebut...",
options:["Observasi","Wawancara","Dokumentasi","Eksperimen"],answer:1},

{type:"pg",q:"Diagram batang cocok untuk...",
options:["Perbandingan data","Cerita panjang","Rumus","Kode"],answer:0},

{type:"pg",q:"Aplikasi pengolah angka adalah...",
options:["Word","Excel","Paint","PowerPoint"],answer:1},

{type:"pg",q:"Rumus untuk mencari rata-rata di Excel adalah...",
options:["=SUM()","=AVERAGE()","=MAX()","=MIN()"],answer:1},

{type:"pg",q:"Cell pada Excel adalah...",
options:["Kumpulan sheet","Pertemuan baris dan kolom","Menu","File"],answer:1},

{type:"pg",q:"Data harus akurat agar...",
options:["Tidak salah analisis","Banyak warna","Lebih panjang","Cepat rusak"],answer:0},

{type:"pg",q:"Data sebelum dibuat grafik harus...",
options:["Diurutkan dan dirapikan","Dihapus","Dicetak","Disimpan saja"],answer:0},

{type:"pg",q:"Fungsi filter digunakan untuk...",
options:["Menghapus file","Menyaring data","Mewarnai","Menggambar"],answer:1},

{type:"pg",q:"Langkah pengolahan data pertama adalah...",
options:["Menyajikan","Mengumpulkan","Menganalisis","Menyimpulkan"],answer:1},

{type:"pg",q:"Sorting data berarti...",
options:["Menghapus data","Mengurutkan data","Menjumlahkan","Menggandakan"],answer:1},

/* 16–20 Benar Salah */

{type:"bs",q:"Data kualitatif berbentuk angka.",answer:false},

{type:"bs",q:"Workbook adalah kumpulan worksheet.",answer:true},

{type:"bs",q:"Diagram lingkaran cocok untuk perbandingan kategori.",answer:true},

{type:"bs",q:"Filter berfungsi mengurutkan data.",answer:false},

{type:"bs",q:"Analisis data bertujuan menarik kesimpulan.",answer:true},

/* 21 Menjodohkan */

{type:"match",
q:"Cocokkan rumus dengan fungsinya",
pairs:[
["SUM","Menjumlahkan data"],
["MAX","Mencari nilai terbesar"],
["MIN","Mencari nilai terkecil"]
]},

/* 22–26 Isian */

{type:"isian",q:"Tuliskan rumus SUM untuk menjumlahkan A1 sampai A5",answer:"=SUM(A1:A5)"},

{type:"isian",q:"Tanda '-' pada Excel digunakan untuk operasi ...",answer:"pengurangan"},

{type:"isian",q:"Data sebelum grafik sebaiknya disusun dalam bentuk ...",answer:"tabel"},

{type:"isian",q:"Langkah akhir pengolahan data adalah ...",answer:"menyimpulkan"},

{type:"isian",q:"Fitur untuk menyaring data disebut ...",answer:"filter"},

/* 27–31 Essay */

{type:"essay",q:"Jelaskan pentingnya pengorganisasian data!"},
{type:"essay",q:"Jelaskan fungsi dan contoh aplikasi pengolah angka!"},
{type:"essay",q:"Jelaskan langkah menghitung rata-rata di Excel!"},
{type:"essay",q:"Jelaskan cara mengolah dan menyajikan data!"},
{type:"essay",q:"Jelaskan keunggulan rumus otomatis di Excel!"}

];

let currentQuestion=0;
let userAnswers=new Array(questions.length).fill(null);

function loadQuestion(){
document.getElementById("current").textContent=currentQuestion+1;
let q=questions[currentQuestion];
let html=`<div class="question">${q.q}</div>`;

if(q.type==="pg"){
q.options.forEach((opt,i)=>{
html+=`<label><input type="radio" onclick="saveAnswer(${i})"> ${opt}</label>`;
});
}

if(q.type==="bs"){
html+=`<label><input type="radio" onclick="saveAnswer(true)"> Benar</label>`;
html+=`<label><input type="radio" onclick="saveAnswer(false)"> Salah</label>`;
}

if(q.type==="isian"){
html+=`<input type="text" oninput="saveAnswer(this.value)">`;
}

if(q.type==="essay"){
html+=`<textarea oninput="saveAnswer(this.value)"></textarea>`;
}

if(q.type==="match"){
q.pairs.forEach((p,i)=>{
html+=`${p[0]} = <input type="text" oninput="saveMatch(${i},this.value)"><br>`;
});
}

document.getElementById("questionContainer").innerHTML=html;
}

function saveAnswer(val){
userAnswers[currentQuestion]=val;
}

function saveMatch(index,val){
if(!userAnswers[currentQuestion])userAnswers[currentQuestion]={};
userAnswers[currentQuestion][index]=val;
}

function nextQuestion(){
if(currentQuestion<questions.length-1){currentQuestion++;loadQuestion();}
}

function prevQuestion(){
if(currentQuestion>0){currentQuestion--;loadQuestion();}
}

function submitQuiz(){
let score=0;
let autoTotal=26; 

questions.forEach((q,i)=>{
if(q.type==="pg"||q.type==="bs"){
if(userAnswers[i]==q.answer)score++;
}
if(q.type==="isian"){
if((userAnswers[i]||"").toLowerCase().includes(q.answer.toLowerCase()))score++;
}
if(q.type==="match"){
let correct=true;
q.pairs.forEach((p,index)=>{
if(!userAnswers[i]||!userAnswers[i][index]||
!userAnswers[i][index].toLowerCase().includes(p[1].toLowerCase()))correct=false;
});
if(correct)score++;
}
});

let nilai=Math.round((score/autoTotal)*100);

document.getElementById("result").innerHTML=
`<h2>Nilai Otomatis: ${nilai}</h2>
<p>Essay diperiksa manual oleh guru.</p>
<h3>Ringkasan Materi:</h3>
Data adalah fakta mentah. Pengolahan data meliputi: mengumpulkan, mengolah, menyajikan, dan menyimpulkan.
Excel digunakan untuk menghitung otomatis dengan rumus seperti SUM, AVERAGE, MAX, MIN.
Filter untuk menyaring data, Sorting untuk mengurutkan data.
`;
}

loadQuestion();

/* TIMER */
let totalTime=1500;
let timeLeft=totalTime;
let timerDisplay=document.getElementById("time");

let timer=setInterval(function(){
let m=Math.floor(timeLeft/60);
let s=timeLeft%60;
timerDisplay.textContent=(m<10?"0":"")+m+":"+(s<10?"0":"")+s;
timeLeft--;
if(timeLeft<0){
clearInterval(timer);
submitQuiz();
}
},1000);

</script>

</body>
</html>
